<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>职海导航 - AI求职Offer成功率评估助手</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; }
        .mobile-container { width: 375px; height: 812px; margin: 0 auto; background: white; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 8px solid #334155; border-radius: 40px; }
        .safe-area { padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .blue-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div class="mobile-container relative overflow-y-auto">
<!-- 顶部装饰 -->
<div class="absolute top-0 w-full h-64 bg-white rounded-b-[40px] -z-10 shadow-sm border-b border-slate-100"></div>
<header class="safe-area pt-10 pb-6">
<div class="flex justify-between items-center mb-4 text-slate-400">
<span class="text-xs font-bold bg-slate-100 px-3 py-1 rounded-full border border-slate-200">2026年03月11日 · 星期三</span>
<span class="iconify w-7 h-7 text-blue-600" data-icon="solar:user-circle-bold-duotone"></span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-[#1e3a8a]">职海导航</h1>
<p class="text-sm text-[#2563eb] font-semibold mt-1">AI求职Offer成功率评估助手</p>
<p class="text-[12px] text-slate-500 mt-4 leading-relaxed font-medium bg-slate-50 p-3 border border-slate-100 rounded-xl">职海导航是一个帮助求职者分析修改简历、匹配岗位需求并评估offer成功率的智能体</p>
</header>
<main class="px-5 space-y-6 mt-4">
<!-- 实时数据统计 -->
<div class="bg-white rounded-2xl p-4 shadow-md border border-slate-200 flex items-center justify-between">
<div class="flex -space-x-2">
<img alt="User 1" class="w-8 h-8 rounded-full border-2 border-white" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1"/>
<img alt="User 2" class="w-8 h-8 rounded-full border-2 border-white" src="https://api.dicebear.com/7.x/avataaars/svg?seed=2"/>
<img alt="User 3" class="w-8 h-8 rounded-full border-2 border-white" src="https://api.dicebear.com/7.x/avataaars/svg?seed=3"/>
</div>
<p class="text-[10px] text-slate-700 font-bold">今天已有 <span class="text-blue-700">1,284</span> 位求职者获得了评估报告</p>
</div>
<!-- 功能卡片区 -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-blue-50 p-4 rounded-3xl border border-blue-100 hover:shadow-md transition-shadow">
<span class="iconify w-10 h-10 text-blue-600 mb-3" data-icon="solar:document-bold-duotone"></span>
<h3 class="font-bold text-slate-800">简历深度分析</h3>
<p class="text-[10px] text-slate-500 mt-1">AI智能挖掘简历硬伤，提升通过率</p>
</div>
<div class="bg-indigo-50 p-4 rounded-3xl border border-indigo-100 hover:shadow-md transition-shadow">
<span class="iconify w-10 h-10 text-indigo-600 mb-3" data-icon="solar:chart-2-bold-duotone"></span>
<h3 class="font-bold text-slate-800">岗位匹配评估</h3>
<p class="text-[10px] text-slate-500 mt-1">精准测算人岗匹配，预估Offer率</p>
</div>
</div>
<!-- 热门推荐 -->
<div>
<h4 class="text-sm font-bold text-slate-800 mb-3 ml-1">热门评估岗位</h4>
<div class="space-y-3">
<div class="flex items-center p-3 bg-slate-50 rounded-2xl">
<span class="iconify w-8 h-8 text-blue-500" data-icon="solar:code-circle-bold-duotone"></span>
<div class="ml-3 flex-1">
<h5 class="text-sm font-semibold">高级产品经理</h5>
<p class="text-[10px] text-slate-400">匹配热度：🔥 2.4k</p>
</div>
<span class="text-[10px] bg-white px-2 py-1 rounded-full text-blue-600 border border-blue-100 italic">NEW</span>
</div>
<div class="flex items-center p-3 bg-slate-50 rounded-2xl">
<span class="iconify w-8 h-8 text-purple-500" data-icon="solar:graph-up-bold-duotone"></span>
<div class="ml-3 flex-1">
<h5 class="text-sm font-semibold">算法工程师</h5>
<p class="text-[10px] text-slate-400">平均起薪：￥35k+</p>
</div>
</div>
<div class="flex items-center p-3 bg-slate-50 rounded-2xl">
<span class="iconify w-8 h-8 text-emerald-500" data-icon="solar:palette-bold-duotone"></span>
<div class="ml-3 flex-1">
<h5 class="text-sm font-semibold">资深UI/UX设计师</h5>
<p class="text-[10px] text-slate-400">远程职位较多</p>
</div>
</div>
</div>
</div>
</main>
<!-- 底部功能区 -->
<div class="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 p-6 space-y-4">
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center py-3 bg-slate-100 rounded-2xl text-slate-700 text-sm font-medium">
<span class="iconify mr-2" data-icon="solar:upload-minimalistic-bold"></span> 上传简历
                </button>
<input class="px-4 py-3 bg-slate-100 rounded-2xl text-sm border-none focus:ring-2 focus:ring-blue-500 outline-none" placeholder="输入目标岗位" type="text"/>
</div>
<a class="block w-full text-center py-4 blue-gradient text-white rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-[0.98] transition-all" href="input.html">
                开始一键评估
            </a>
<div class="h-6 w-32 bg-slate-200 mx-auto rounded-full mt-2 bg-opacity-20 flex justify-center items-center">
<div class="w-10 h-1 bg-slate-300 rounded-full"></div>
</div>
</div>
</div>
</body>
</html>
